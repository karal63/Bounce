name: GitHub Actions Demo
run-name: Bounce CI/CD
on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
jobs:
    Explore-GitHub-Actions:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [24.x]

        services:
            mysql:
                image: mysql:8
                env:
                    DB_HOST: localhost
                    DB_USER: root
                    DB_NAME: bounce
                ports:
                    - 3306:3306
            redis:
                image: redis:7
                env:
                    REDIS_USERNAME: default
                    REDIS_PASSWORD:
                    REDIS_HOST: 127.0.0.1
                    REDIS_PORT: 6379
                ports:
                    - 6379:6379

        steps:
            - uses: actions/checkout@v4
            - name: Starting node.js ${{matrix.node-version}}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{matrix.node-version}}

            - name: install dependencies
              run: npm ci

            - name: Install playwright browsers
              working-directory: ./client
              run: npx playwright install --with-deps

            - name: Build app
              working-directory: ./client
              run: npm run build

            - name: "Run app"
              run: npm run dev

            - name: Run tests
              run: npm run test

            # - name: Run e2e tests
            #   working-directory: ./client
            #   run: npm run test:e2e
